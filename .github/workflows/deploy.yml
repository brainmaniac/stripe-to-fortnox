name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Run tests
        run: go test ./...

  deploy:
    name: Deploy to VPS
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            DEPLOY_PATH="${{ secrets.VPS_DEPLOY_PATH }}"

            if [ -d "$DEPLOY_PATH/.git" ]; then
              echo "Pulling latest changes..."
              git -C "$DEPLOY_PATH" -c credential.helper='' pull origin main
            else
              echo "Cloning repository..."
              git -c credential.helper='' clone ${{ secrets.VPS_REPO_URL }} "$DEPLOY_PATH"
            fi

            cd "$DEPLOY_PATH"

            if [ ! -f ".env" ]; then
              echo "::warning::No .env file found on VPS. SSH in and run: go run ./cmd/setup"
              exit 0
            fi

            docker compose up -d --build
